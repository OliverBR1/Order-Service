spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.consumer.properties.partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor
spring.kafka.streams.application-id=order-service-streams

spring.datasource.url=${DB_URL}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.hikari.data-source-properties.sslmode=verify-full

spring.jpa.hibernate.ddl-auto=validate
# false = consistente com dev; em prod sql.init.mode=never, então schema.sql não executa de qualquer forma
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

management.server.port=9090
management.server.address=127.0.0.1
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ACTUATOR_ADMIN
management.endpoints.web.exposure.include=health,prometheus

springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

api.security.key=${API_KEY}

security.headers.csp=default-src 'none'; frame-ancestors 'none'
security.headers.hsts.enabled=true
