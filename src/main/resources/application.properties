server.port=8081
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100
server.tomcat.max-connections=8192
server.tomcat.connection-timeout=5000
server.tomcat.max-http-form-post-size=1MB
spring.servlet.multipart.max-request-size=1MB
spring.servlet.multipart.max-file-size=1MB

spring.datasource.url=jdbc:postgresql://localhost:5433/orderdb
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}

spring.datasource.hikari.pool-name=OrderServicePool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.keepalive-time=300000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.streams.bootstrap-servers=localhost:9092

spring.kafka.admin.fail-fast=false
spring.kafka.admin.properties.reconnect.backoff.ms=1000
spring.kafka.admin.properties.reconnect.backoff.max.ms=10000
spring.kafka.admin.properties.request.timeout.ms=30000
spring.kafka.admin.properties.retry.backoff.ms=500
spring.kafka.admin.properties.connections.max.idle.ms=540000

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.retries=3
spring.kafka.producer.properties.retry.backoff.ms=1000

spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.olivertech.orderservice.application.dto
spring.kafka.consumer.properties.partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor

spring.kafka.streams.application-id=order-service-streams
spring.kafka.streams.state-dir=${java.io.tmpdir}/kafka-streams/order-service
spring.kafka.streams.properties.reconnect.backoff.ms=1000
spring.kafka.streams.properties.reconnect.backoff.max.ms=10000
spring.kafka.streams.properties.connections.max.idle.ms=540000


kafka.topics.orders=orders-topic
kafka.topics.orders-dlt=orders-topic.DLT
kafka.topics.orders-retry-0=orders-topic-0
kafka.topics.orders-retry-1=orders-topic-1
kafka.topics.orders-retry-2=orders-topic-2
kafka.topics.order-metrics=order-metrics-topic
kafka.partitions=3
kafka.replicas=1

management.server.port=9090
management.server.address=127.0.0.1
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

spring.mvc.problemdetails.enabled=true




