
# ==========================================
# Server
# ==========================================
server.port=8081

# ==========================================
# DataSource (PostgreSQL via docker-compose)
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5433/orderdb
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:admin123}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ==========================================
# Kafka
# ==========================================
spring.kafka.bootstrap-servers=localhost:9092

# Nao bloqueia a inicializacao se o Kafka ainda nao subiu
spring.kafka.admin.fail-fast=false

# Producer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Consumer
spring.kafka.consumer.group-id=order-service
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.olivertech.orderservice.application.dto
# Obrigatorio para @RetryableTopic no Spring Kafka 3.x — evita InconsistentGroupProtocolException
spring.kafka.consumer.properties.partition.assignment.strategy=org.apache.kafka.clients.consumer.CooperativeStickyAssignor

# Streams — application-id DEVE ser diferente do consumer group-id
# (Kafka Streams usa application-id como group.id com protocolo incompativel)
spring.kafka.streams.application-id=order-service-streams
spring.kafka.streams.state-dir=${java.io.tmpdir}/kafka-streams/order-service

# ==========================================
# Topicos Kafka personalizados
# ==========================================
kafka.topics.orders=orders-topic
kafka.topics.orders-dlt=orders-topic.DLT
kafka.topics.orders-retry-0=orders-topic-0
kafka.topics.orders-retry-1=orders-topic-1
kafka.topics.orders-retry-2=orders-topic-2
kafka.topics.order-metrics=order-metrics-topic
kafka.partitions=3
kafka.replicas=1

# ==========================================
# Actuator / Observabilidade
# ==========================================
management.endpoints.web.exposure.include=health,prometheus,info
management.endpoint.health.show-details=always

# ==========================================
# SpringDoc / Swagger
# ==========================================
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# Desabilita a Whitelabel Error Page — erros retornam JSON pelo GlobalExceptionHandler
spring.mvc.problemdetails.enabled=true
server.error.whitelabel.enabled=false

