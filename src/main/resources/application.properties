spring.application.name=order-service

# --- JPA / Banco de dados (PostgreSQL) ---
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orderdb}
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# --- Kafka ---
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# --- Producer ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.linger.ms=5

# --- Consumer ---
spring.kafka.consumer.group-id=order-service-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.olivertech.orderservice.application.dto
spring.kafka.consumer.properties.session.timeout.ms=45000
spring.kafka.consumer.properties.heartbeat.interval.ms=15000
spring.kafka.consumer.properties.request.timeout.ms=30000

# --- Listener ---
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=3
spring.kafka.listener.observation-enabled=true
spring.kafka.template.observation-enabled=true

# --- Kafka Streams ---
spring.kafka.streams.application-id=order-streams-app
spring.kafka.streams.default-key-serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.default-value-serde=org.springframework.kafka.support.serializer.JsonSerde

# --- Non-blocking retry ---
spring.kafka.retry.topic.attempts=4
spring.kafka.retry.topic.delay=2000
spring.kafka.retry.topic.multiplier=2.0
spring.kafka.retry.topic.max-delay=30000

# --- Topics customizados ---
kafka.topics.orders=orders-topic
kafka.topics.orders-dlt=orders-topic.DLT
kafka.topics.orders-retry-0=orders-topic-retry-0
kafka.topics.orders-retry-1=orders-topic-retry-1
kafka.topics.orders-retry-2=orders-topic-retry-2
kafka.topics.order-metrics=order-metrics-topic
kafka.partitions=3
kafka.replicas=1

# --- Actuator ---
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.kafka.consumer.processing.time=true

# --- Springdoc / Swagger ---
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false