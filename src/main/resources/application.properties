# ============================================================
# application.properties
# ============================================================

spring.application.name=order-service

# --- JPA / Banco de dados (PostgreSQL) ---
# Variaveis de ambiente com fallback para desenvolvimento local
# Em producao, defina as variaveis sem fallback no application-prod.properties
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/orderdb}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# create: recria o schema a cada startup (dev) ? use validate em producao
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=false
# Desabilita open-in-view ? evita sessao JPA aberta na camada HTTP
spring.jpa.open-in-view=false

# Variavel de ambiente ? bootstrap-servers
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

# --- Producer ---
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
# acks e retries sao redefinidos automaticamente pelo enable.idempotence=true (MAX_INT)
# mantemos apenas para documentar a intencao explicita do projeto
spring.kafka.producer.acks=all
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.properties.max.in.flight.requests.per.connection=1
spring.kafka.producer.properties.request.timeout.ms=30000
spring.kafka.producer.properties.delivery.timeout.ms=120000
spring.kafka.producer.properties.linger.ms=5

# --- Consumer ---
spring.kafka.consumer.group-id=order-service-group
# auto-offset-reset: default e latest; earliest e necessario aqui
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
# enable-auto-commit: default e true; desabilitado para controle manual de offset
spring.kafka.consumer.enable-auto-commit=false
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.orderservice.application.dto
spring.kafka.consumer.properties.session.timeout.ms=45000
spring.kafka.consumer.properties.heartbeat.interval.ms=15000
# max.poll.interval.ms: removido ? default do Kafka (300000ms) e suficiente
spring.kafka.consumer.properties.request.timeout.ms=30000

# --- Listener ---
# ack-mode: default e BATCH; RECORD garante commit por mensagem individualmente
spring.kafka.listener.ack-mode=record
spring.kafka.listener.concurrency=3
# observation-enabled: substitui setObservationEnabled(true) no codigo Java
spring.kafka.listener.observation-enabled=true
spring.kafka.template.observation-enabled=true

# --- Kafka Streams ---
spring.kafka.streams.application-id=order-streams-app
spring.kafka.streams.default-key-serde=org.apache.kafka.common.serialization.Serdes$StringSerde
spring.kafka.streams.default-value-serde=org.springframework.kafka.support.serializer.JsonSerde

# --- Non-blocking retry (recomendado pela documentaçăo Spring Kafka) ---
# attempts: default e 3; 4 = 1 original + 3 retries com backoff exponencial
spring.kafka.retry.topic.attempts=4
spring.kafka.retry.topic.delay=2000
# multiplier: default e 1.0 (sem backoff); 2.0 = exponencial
spring.kafka.retry.topic.multiplier=2.0
# max-delay: default e 0 (sem limite); 30s evita espera excessiva
spring.kafka.retry.topic.max-delay=30000

# --- Topics customizados ---
kafka.topics.orders=orders-topic
kafka.topics.orders-dlt=orders-topic.DLT
kafka.topics.orders-retry-0=orders-topic-retry-0
kafka.topics.orders-retry-1=orders-topic-retry-1
kafka.topics.orders-retry-2=orders-topic-retry-2
kafka.topics.order-metrics=order-metrics-topic
kafka.partitions=3
kafka.replicas=1

# --- Actuator ---
# show-details: sobrescrito para when-authorized em application-prod.properties
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.percentiles-histogram.kafka.consumer.processing.time=true

# --- Springdoc / Swagger ---
# api-docs.path e swagger-ui.path: removidos ? valores iguais ao default
springdoc.swagger-ui.operations-sorter=alpha
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.show-actuator=false

# ============================================================
# application-prod.properties ? overrides de producao
# ============================================================

# Obrigatorio em producao ? sem fallback
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}

# Banco de dados PostgreSQL ? variaveis obrigatorias em producao (sem fallback)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# validate: verifica schema sem alterá-lo ? Flyway/Liquibase gerenciam migraçőes
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# SEGURANÇA: nao expoe detalhes de infra publicamente
management.endpoint.health.show-details=when-authorized
management.endpoint.health.roles=ACTUATOR_ADMIN
management.endpoints.web.exposure.include=health,prometheus

# SEGURANÇA: nunca expor Swagger em producao
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false
